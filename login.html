<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SkyLens</title>
    <meta name="description" content="Sign in to your SkyLens account.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link id="bootstrap-css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <!-- Top-Right Toggles -->
    <div class="position-absolute top-0 end-0 p-4 d-flex gap-2 z-3">
        <button class="theme-toggle btn btn-sm btn-outline-custom border-0 p-2" title="Toggle Theme">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="rtl-toggle btn btn-sm btn-outline-custom border-0 p-2" title="Toggle RTL">
            <span class="rtl-text fw-bold">RTL</span>
        </button>
    </div>

    <!-- Main Content -->
    <main class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 2rem 0;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4">
                    <div class="service-card p-4 p-md-5">
                        <div class="text-center mb-4">
                            <a class="brand-logo-dark d-inline-flex mb-4" href="index.html" aria-label="SkyLens home">
                                <img src="favicon.png" alt="SkyLens Logo" width="48" height="48" class="me-2">
                                <span class="h4 fw-bold text-main m-0 tracking-tight">SKYLENS</span>
                            </a>
                            <h2 class="fw-bold text-main mb-2">Welcome Back</h2>
                            <p class="text-gray small mb-3">Sign in to your SkyLens account</p>
                        </div>

                        <form id="loginForm" onsubmit="event.preventDefault();">
                            <div class="mb-3 text-start">
                                <label for="email" class="form-label text-gray small fw-medium">Email Address</label>
                                <input type="email" class="form-control bg-transparent text-main border-secondary" id="email" required placeholder="name@example.com">
                            </div>
                            
                            <div class="mb-3 text-start">
                                <label for="password" class="form-label text-gray small fw-medium mb-1">Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control bg-transparent text-main border-secondary border-end-0" id="password" required placeholder="••••••••">
                                    <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'; this.querySelector('i').classList.toggle('bi-eye'); this.querySelector('i').classList.toggle('bi-eye-slash');">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check mb-0">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label text-gray small" for="rememberMe">
                                        Remember Me
                                    </label>
                                </div>
                                <a href="#" class="text-cyan small text-decoration-none">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn btn-gradient w-100 mb-4 py-2">Sign In</button>

                            <div class="text-center mb-4">
                                <span class="text-gray small">Or continue with</span>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 py-2">
                                    <i class="bi bi-google"></i> Google
                                </button>
                                <button type="button" class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 py-2">
                                    <i class="bi bi-apple"></i> Apple
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-gray small mb-0">Don't have an account? <a href="signup.html" class="text-cyan text-decoration-none fw-medium">Sign up</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/theme.js"></script>
</body>
</html>
